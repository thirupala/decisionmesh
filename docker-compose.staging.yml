version: "3.9"
name: decisionmesh-staging

services:

  api-staging:
    image: ${API_IMAGE}
    container_name: dm-api-staging
    restart: unless-stopped
    environment:
      QUARKUS_PROFILE: staging
      QUARKUS_HTTP_PORT: 8081

      QUARKUS_DATASOURCE_REACTIVE_URL: vertx-reactive:postgresql://postgres-staging:5432/${STAGING_DB_NAME}
      QUARKUS_DATASOURCE_USERNAME: ${STAGING_DB_USER}
      QUARKUS_DATASOURCE_PASSWORD: ${STAGING_DB_PASSWORD}

      QUARKUS_REDIS_HOSTS: redis://:${STAGING_REDIS_PASSWORD}@redis-staging:6379

      QUARKUS_VAULT_URL: http://openbao-staging:8200
      QUARKUS_VAULT_AUTHENTICATION_CLIENT_TOKEN: ${STAGING_BAO_TOKEN}

      EMBEDDING_URL: http://ollama:11434

    depends_on:
      - postgres-staging
      - redis-staging
      - openbao-staging

    networks:
      - staging

  postgres-staging:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${STAGING_DB_NAME}
      POSTGRES_USER: ${STAGING_DB_USER}
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD}
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    networks:
      - staging

  redis-staging:
    image: redis:7-alpine
    command: redis-server --requirepass ${STAGING_REDIS_PASSWORD}
    restart: unless-stopped
    volumes:
      - redis-staging-data:/data
    networks:
      - staging

  openbao-staging:
    image: openbao/openbao:latest
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${STAGING_BAO_TOKEN}
    networks:
      - staging

networks:
  staging:

volumes:
  postgres-staging-data:
  redis-staging-data: