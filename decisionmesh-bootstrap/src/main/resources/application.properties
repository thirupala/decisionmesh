# ==========================
# OpenBao / Vault
# ==========================
VAULT_ADDR=http://localhost:8200
VAULT_TOKEN=dev-root-token
quarkus.vault.url=http://localhost:8200
quarkus.vault.authentication.client-token=dev-root-token
quarkus.vault.kv-secret-engine-version=2
# Tell Quarkus which OpenBao paths to load as config properties at startup.
# Without this, secrets are NOT loaded and all llm.*.api-key values are empty.
quarkus.vault.secret-config-kv-path=decisionmesh/llm,decisionmesh/db,decisionmesh/auth,decisionmesh/email

# ==========================
# LLM ? bridge OpenBao hyphen keys to dot keys expected by adapters
# OpenBao stores:  llm.anthropic.api-key  (hyphen)
# Adapters read:   llm.anthropic.api.key  (dot)
# The :placeholder default prevents startup failure when key is empty string
# ==========================
#llm.anthropic.api.key=${llm.anthropic.api-key:}
llm.openai.api.key=${llm.openai.api-key:}
llm.gemini.api.key=${llm.gemini.api-key:}
llm.deepseek.api.key=${llm.deepseek.api-key:}

# Azure not in OpenBao ? placeholder prevents empty-string-as-null startup failure
llm.azure.api-key=not-configured
llm.azure.resource-name=not-configured

# ==========================
# LLM config
# ==========================
llm.cache.enabled=true

llm.default.provider=${provider:anthropic}
llm.default.model=${model:claude-haiku-4-5-20251001}
llm.anthropic.model=claude-haiku-4-5-20251001

llm.anthropic.max-tokens=1024
llm.anthropic.default-model=claude-haiku-4-5-20251001
llm.anthropic.default-timeout-ms=30000
llm.anthropic.claude-3-5-sonnet.input-cost-per-1k=0.003
llm.anthropic.claude-3-5-sonnet.output-cost-per-1k=0.015
llm.anthropic.claude-3-5-haiku.input-cost-per-1k=0.001
llm.anthropic.claude-3-5-haiku.output-cost-per-1k=0.005

llm.openai.default-model=gpt-4o-mini
llm.openai.default-timeout-ms=30000
llm.openai.gpt-4o.input-cost-per-1k=0.005
llm.openai.gpt-4o.output-cost-per-1k=0.015
llm.openai.gpt-4o-mini.input-cost-per-1k=0.00015
llm.openai.gpt-4o-mini.output-cost-per-1k=0.0006

llm.gemini.default-model=gemini-2.0-flash
llm.gemini.default-timeout-ms=30000
llm.gemini.gemini-2-0-flash.input-cost-per-1k=0.00010
llm.gemini.gemini-2-0-flash.output-cost-per-1k=0.00040

llm.deepseek.default-model=deepseek-chat
llm.deepseek.default-timeout-ms=60000

llm.azure.default-deployment=gpt-4o
llm.azure.default-timeout-ms=30000
llm.azure.api-version=2024-12-01-preview

# ==========================
# Planner / Selector
# ==========================
llm.selector.epsilon=0.10
llm.selector.strict-mode=false
llm.selector.warmup-calls=20
llm.selector.circuit-breaker-threshold=5
llm.registry.fail-fast-on-empty=false

planner.epsilon=0.10
planner.fallback-enabled=true
learning.cache.ttl-hours=24

# ==========================
# Datasource
# ==========================
quarkus.datasource.devservices.enabled=false
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=10

# ==========================
# Flyway
# ==========================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.repair-at-start=true
quarkus.flyway.out-of-order=true

# ==========================
# Hibernate
# ==========================
quarkus.hibernate-reactive.database.generation=none
quarkus.hibernate-orm.mapping.format.global=ignore

quarkus.index-dependency.persistence.group-id=com.decisionmesh
quarkus.index-dependency.persistence.artifact-id=decisionmesh-persistence

quarkus.index-dependency.security.group-id=com.decisionmesh
quarkus.index-dependency.security.artifact-id=decisionmesh-security

# ==========================
# HTTP Security
# ==========================
quarkus.http.auth.permission.preflight.paths=/*
quarkus.http.auth.permission.preflight.methods=OPTIONS
quarkus.http.auth.permission.preflight.policy=permit
quarkus.http.auth.permission.preflight.priority=1

quarkus.http.auth.permission.public.paths=/q/*,/health/*,/metrics,/signup,/signup/*,/webhooks/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.priority=2

quarkus.http.auth.permission.api.paths=/api/*,/v1/*
quarkus.http.auth.permission.api.policy=authenticated
quarkus.http.auth.permission.api.priority=3

quarkus.http.auth.permission.debug.paths=/api/billing/debug-token
quarkus.http.auth.permission.debug.policy=permit

quarkus.http.auth.permission.cors-preflight.paths=/*
quarkus.http.auth.permission.cors-preflight.methods=OPTIONS
quarkus.http.auth.permission.cors-preflight.policy=permit

# ==========================
# CORS
# ==========================
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With,Idempotency-Key
quarkus.http.cors.exposed-headers=Location,Info
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H

# ==========================
# Email
# ==========================
quarkus.mailer.from=thirupala@gmail.com
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.username=thirupala@gmail.com
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.auth-methods=LOGIN
quarkus.mailer.mock=false

