
# ========================================================================

# application-prod.properties

# Production

# ========================================================================

quarkus.profile=prod

# ==========================
# OIDC / ZITADEL
# ==========================
quarkus.oidc.auth-server-url=https://decisionmesh-1pgrry.eu1.zitadel.cloud
quarkus.oidc.token.issuer=https://decisionmesh-1pgrry.eu1.zitadel.cloud
quarkus.oidc.client-id=368134611768783581
quarkus.oidc.tls.verification=certificate-validation

# ==========================
# Vault
# ==========================
quarkus.vault.url=http://openbao:8200
quarkus.vault.authentication.client-token=${VAULT_TOKEN}

# ==========================
# Datasource
# ==========================
quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/decisionmesh
quarkus.datasource.reactive.url=postgresql://postgres:5432/decisionmesh

# ==========================
# Redis
# ==========================
quarkus.redis.hosts=redis://redis:6379

# ==========================
# Kafka
# ==========================
mp.messaging.connector.smallrye-kafka.bootstrap.servers=kafka:9092

# ==========================
# CORS
# ==========================
quarkus.http.cors=true
quarkus.http.cors.origins=https://decimeshi.com
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With,Idempotency-Key
quarkus.http.cors.access-control-allow-credentials=true

# ==========================
# Logging
# ==========================
quarkus.log.level=WARN
quarkus.log.console.json=true

# ==========================
# Security hardening
# ==========================
quarkus.http.insecure-requests=disabled