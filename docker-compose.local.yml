# ============================================================
# docker-compose_local.yml — local development overlay
# Extends docker-compose.yml.  API runs from your IDE/Maven.
#
# docker compose -f docker-compose.yml -f docker-compose.local.yml --env-file .env up -d
# ============================================================

services:

  postgres:
    ports:
      - "5432:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data

  redis:
    ports:
      - "6379:6379"

  kafka:
    ports:
      - "9092:9092"
    environment:
      # Override advertised listener to localhost so Quarkus
      # running on the host (not inside Docker) can reach Kafka.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

  # Dev mode: uses hashicorp/vault:1.15 which reliably honours
  # VAULT_DEV_ROOT_TOKEN_ID (OpenBao v2 ignores this env var).
  # Token is pinned to "dev-root-token" for predictability.
  openbao:
    image: hashicorp/vault:1.15
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:  dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    ports:
      - "8200:8200"

  ollama:
    ports:
      - "11434:11434"
    volumes:
      - ollama-local-data:/root/.ollama

volumes:
  postgres-local-data:
  ollama-local-data:
